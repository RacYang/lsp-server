stage: alpha

paths:
  generated_marker: gen
  negatives: .build/negatives

tools:
  go: 1.26.2
  golangci-lint: 2.1.6
  go-arch-lint: 1.12.0
  buf: 1.53.0
  govulncheck: 1.1.4
  gitleaks: 8.28.0
  yq: 4.45.1
  markdownlint-cli2: 0.18.1
  shellcheck: 0.10.0
  yamllint: 1.37.1
  goimports: 0.32.0
  protoc-gen-go: 1.36.10
  protoc-gen-go-grpc: 1.5.1

coverage:
  thresholds:
    internal/mahjong/wall: 65
    internal/mahjong/...: 90
    internal/domain/...: 80
    internal/app: 8
    internal/handler: 50
    internal/service/room: 50
    cmd/all: 45
    cmd/gate: 45
    cmd/lobby: 15
    cmd/room: 40
    default: 60
  extra_exclude: []

lint:
  golangci:
    enable:
      - govet
      - errcheck
      - staticcheck
      - ineffassign
      - unused
      - gosec
      - revive
      - gocritic
      - errorlint
      - bodyclose
      - noctx
      - testifylint
    revive:
      disable_rules:
        - exported
        - package-comments
        - unused-parameter
  arch:
    layers:
      # 将麻将子包拆分为独立组件，避免 go-arch-lint 将子包 import 误判为跨组件依赖
      mahjong_xzdd: internal/mahjong/sichuanxzdd/**
      mahjong_rules: internal/mahjong/rules/**
      mahjong_tile: internal/mahjong/tile/**
      mahjong_wall: internal/mahjong/wall/**
      mahjong_hand: internal/mahjong/hand/**
      mahjong_hu: internal/mahjong/hu/**
      mahjong_fan: internal/mahjong/fan/**
      domain: internal/domain/**
      app: internal/app/**
      net: internal/net/**
      cluster: internal/cluster/**
      handler: internal/handler/**
      store: internal/store/**
      service: internal/service/**
      session: internal/session/**
      config: internal/config/**
      clock: internal/clock/**
      metrics: internal/metrics/**
      log: internal/log/**
      cmd: cmd/**
      pkg: pkg/**
      apigen: api/gen/**
    deny:
      - from: mahjong_xzdd
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_rules
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_tile
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_wall
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_hand
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_hu
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: mahjong_fan
        to: [net, cluster, handler, store, service, session, app, clock, metrics, cmd]
      - from: domain
        to: [net, cluster, handler, store, service, app, clock, metrics, cmd]
      - from: handler
        to: [store]
      - from: service
        to: [net, handler, cluster, cmd]
      - from: pkg
        to:
          - mahjong_xzdd
          - mahjong_rules
          - mahjong_tile
          - mahjong_wall
          - mahjong_hand
          - mahjong_hu
          - mahjong_fan
          - domain
          - app
          - net
          - cluster
          - handler
          - store
          - service
          - session
          - config
          - clock
          - metrics
          - log
          - cmd
          - apigen
      - from: apigen
        to:
          - mahjong_xzdd
          - mahjong_rules
          - mahjong_tile
          - mahjong_wall
          - mahjong_hand
          - mahjong_hu
          - mahjong_fan
          - domain
          - app
          - net
          - cluster
          - handler
          - store
          - service
          - session
          - config
          - clock
          - metrics
          - log
          - cmd
          - pkg

deps:
  denylist:
    - github.com/topfreegames/pitaya
    - github.com/lonng/nano
    - github.com/name5566/leaf
    - github.com/davyxu/cellnet
    - github.com/xiaonanln/goworld
    - github.com/liangdas/mqant

proto:
  baseline_ref: refs/tags/proto-baseline

commit:
  conventional_types:
    - feat
    - fix
    - docs
    - refactor
    - test
    - chore
    - build
    - ci
    - perf
    - style
  scopes_required: false
  scope_pattern: "^[a-z0-9][a-z0-9/-]*$"
  summary_min_cjk_ratio: 0.20
  summary_disallow_terminal_punctuation: true

git:
  default_branch: main
  protected_branches:
    - main
  branch:
    topic_pattern: "^(feat|fix|docs|refactor|test|chore|build|ci|perf|style)/[a-z0-9][a-z0-9/-]*$"
    forbid_direct_commit_on_protected: true
    allow_detached_head: true
    allow_branches:
      - main
  protected_push:
    reject_direct_push: true
    reject_non_fast_forward: true
  merge:
    server_strategy: squash
    forbid_merge_commits_on_protected: true
  history:
    allow_force_push_on_protected: false
    prefer_force_with_lease_elsewhere: true
  tags:
    release_pattern: "^v(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)\\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$"
    allow_special:
      - proto-baseline
    check_pushed_tags_only: true
  trailers:
    forbidden:
      - Made-with
    generated_allowlist: []
  repo_hygiene:
    max_tracked_file_bytes: 2097152
    forbidden_basenames:
      - ".DS_Store"
      - "Thumbs.db"
    binary_blocked: true
    allow_binary_globs: []
    allow_large_file_globs: []
  signing:
    policy: recommended
  ci_parity:
    pre_commit_target: verify-pre-commit
    pre_push_target: verify
    ci_target: verify

language:
  docs_paths:
    - "docs/**/*.md"
    - "*.md"
    - "**/README.md"
    - ".cursor/rules/*.mdc"
    - ".cursor/skills/**/SKILL.md"
  docs_exclude:
    - ".build/negatives/**"
    - "api/gen/**"
  docs_min_cjk_ratio: 0.20

commenting:
  code_paths:
    - "**/*.go"
  code_exclude:
    - "**/gen/**"
    - ".build/negatives/**"
    - "pkg/logx/**"
  min_cjk_ratio: 0.30
  technical_keywords:
    - Goroutine
    - Channel
    - Context
    - Redis
    - PostgreSQL
    - gRPC
    - Protobuf
    - WebSocket
    - etcd
    - Prometheus
    - pprof

logging:
  facade_packages:
    - "racoo.cn/lsp/pkg/logx"
  facade_impl_paths:
    - "pkg/logx/**"
  forbidden_packages:
    - "log/slog"
    - "go.uber.org/zap"
    - "go.uber.org/zap/zapcore"
  message_min_cjk_ratio: 0.30
  required_keys:
    - trace_id
    - user_id
    - room_id

stage_gates:
  bootstrap:
    cover_strict: false
  alpha:
    cover_strict: true
  beta:
    cover_strict: true
  ga:
    cover_strict: true
