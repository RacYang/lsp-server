syntax = "proto3";

package client.v1;

option go_package = "racoo.cn/lsp/api/gen/go/client/v1;clientv1";

// 客户端 v1 载荷：消息类型由二进制帧头的 msg_id 标识，本文件仅承载业务字段与 req_id。

// ErrorCode 为业务错误码，供客户端展示与分支处理。
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNAUTHORIZED = 1;
  ERROR_CODE_ROOM_NOT_FOUND = 2;
  ERROR_CODE_ROOM_FULL = 3;
  ERROR_CODE_INVALID_STATE = 4;
  ERROR_CODE_NOT_YOUR_TURN = 5;
  ERROR_CODE_ROUTE_REDIRECT = 6;
  ERROR_CODE_RATE_LIMITED = 7;
  ERROR_CODE_RECONNECTING = 8;
}

// Envelope 为请求/响应通用外壳；body 使用 oneof 承载具体消息。
message Envelope {
  string req_id = 1;
  // 幂等键由客户端为会改变房间状态的请求生成；为空表示不启用请求去重。
  string idempotency_key = 32;
  oneof body {
    LoginRequest login_req = 2;
    LoginResponse login_resp = 3;
    JoinRoomRequest join_room_req = 4;
    JoinRoomResponse join_room_resp = 5;
    ReadyRequest ready_req = 6;
    ReadyResponse ready_resp = 7;
    DiscardRequest discard_req = 8;
    DiscardResponse discard_resp = 9;
    PongRequest pong_req = 10;
    GangRequest gang_req = 11;
    HuRequest hu_req = 12;
    StartGameNotify start_game = 13;
    DrawTileNotify draw_tile = 14;
    ActionNotify action = 15;
    SettlementNotify settlement = 16;
    // Phase 2 四川血战及会话扩展：以下编号仅追加，不回收旧值。
    HeartbeatRequest heartbeat_req = 17;
    HeartbeatResponse heartbeat_resp = 18;
    LeaveRoomRequest leave_room_req = 19;
    LeaveRoomResponse leave_room_resp = 20;
    RouteRedirectNotify route_redirect = 21;
    ExchangeThreeRequest exchange_three_req = 22;
    ExchangeThreeResponse exchange_three_resp = 23;
    ExchangeThreeDoneNotify exchange_three_done = 24;
    QueMenRequest que_men_req = 25;
    QueMenResponse que_men_resp = 26;
    QueMenDoneNotify que_men_done = 27;
    // Phase 3 断线重连：快照通知，供客户端在恢复后对齐房间视图。
    SnapshotNotify snapshot = 28;
    // Phase 4 交互闭环：动作请求的显式响应。
    PongResponse pong_resp = 29;
    GangResponse gang_resp = 30;
    HuResponse hu_resp = 31;
  }
}

message LoginRequest {
  string nickname = 1;
  // 非空表示尝试用既有会话恢复；空表示新登录。
  string session_token = 2;
}

message LoginResponse {
  string user_id = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  // 新登录或轮换后的不透明会话令牌；客户端下次重连时带回。
  string session_token = 4;
  // true 表示服务端认为已成功恢复既有会话上下文。
  bool resumed = 5;
  // 建议客户端保存的最后游标（与事件帧 req_id 对齐），可为空。
  string resume_cursor = 6;
}

message JoinRoomRequest {
  string room_id = 1;
}

message JoinRoomResponse {
  int32 seat_index = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
}

message ReadyRequest {}

message ReadyResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

message DiscardRequest {
  string tile = 1;
}

message DiscardResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

message PongRequest {}

message PongResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

message GangRequest {
  string tile = 1;
}

message GangResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

message HuRequest {}

message HuResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

// StartGameNotify 表示房间开局（服务端推送）。
message StartGameNotify {
  string room_id = 1;
  int32 dealer_seat = 2;
}

// DrawTileNotify 表示某座位摸牌。
message DrawTileNotify {
  int32 seat_index = 1;
  string tile = 2;
}

// ActionNotify 表示他人可见动作（吃碰杠胡等，Phase 1 简化为文本描述）。
message ActionNotify {
  int32 seat_index = 1;
  string action = 2;
  string tile = 3;
}

// SettlementNotify 表示一局结算摘要。
message SettlementNotify {
  string room_id = 1;
  repeated string winner_user_ids = 2;
  int32 total_fan = 3;
  // 按座位累积分（血战多赢家与退税等），座位与 winner_user_ids 下标一一对应时可省略某侧。
  repeated SeatScore seat_scores = 4;
  // 查花猪、查大叫、退税等罚分条目（点数以游戏内约定货币为单位）。
  repeated PenaltyItem penalties = 5;
  // 可读的半结构化摘要，供客户端先展示，后续可逐步结构化。
  string detail_text = 6;
}

// SeatScore 表示某玩家在本局结算中的番数/胜负摘要。
message SeatScore {
  int32 seat_index = 1;
  string user_id = 2;
  int32 total_fan = 3;
  bool skipped = 4;
}

// PenaltyItem 单条罚分或退税记录。
message PenaltyItem {
  string reason = 1;
  int32 from_seat = 2;
  int32 to_seat = 3;
  int32 amount = 4;
}

// HeartbeatRequest/Response 用于长连接保活，载荷可为空。
message HeartbeatRequest {
  int64 client_ts_ms = 1;
}

message HeartbeatResponse {
  int64 server_ts_ms = 1;
}

// LeaveRoomRequest/Response 离开房间。
message LeaveRoomRequest {}

message LeaveRoomResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

// RouteRedirectNotify 由 gate 告知客户端重连到新的接入地址或携带房间亲和提示。
message RouteRedirectNotify {
  string ws_url = 1;
  string room_id = 2;
  string reason = 3;
}

// ExchangeThreeRequest 换三张：提交要交出的三张牌（字符串编码同 tile 名称）。
message ExchangeThreeRequest {
  repeated string tiles = 1;
  // 1=顺时针 2=对家 3=逆时针（四家必须提交一致方向）
  int32 direction = 2;
}

message ExchangeThreeResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

// ExchangeThreeDoneNotify 服务器广播换三张完成、即将进入定缺。
message ExchangeThreeDoneNotify {
  // 每座位实际换入的三张，按座位索引排列；不展示他人手牌时可为空并仅靠日志回放。
  repeated SeatTiles per_seat = 1;
}

message SeatTiles {
  int32 seat_index = 1;
  repeated string tiles = 2;
}

// QueMenRequest/Notify 定缺：玩家声明一门为缺门。
message QueMenRequest {
  // 0=万 1=条 2=筒（与服务器 tile 包约定一致）
  int32 suit = 1;
}

message QueMenResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
}

// QueMenDoneNotify 广播四人已定缺，进入开局打牌。
message QueMenDoneNotify {
  // 每座位缺门花色，-1 表示未公开
  repeated int32 que_suit_by_seat = 1;
}

// SnapshotNotify 为重连恢复下发的房间视图摘要；cursor 为快照游标，格式见 ADR-0013。
message SnapshotNotify {
  string room_id = 1;
  repeated string player_ids = 2;
  repeated int32 que_suit_by_seat = 3;
  string cursor = 4;
  string state = 5;
  int32 acting_seat = 6;
  string waiting_action = 7;
  string pending_tile = 8;
  repeated string available_actions = 9;
  repeated ClaimCandidate claim_candidates = 10;
}

// ClaimCandidate 表示快照中仍然有效的抢答候选。
message ClaimCandidate {
  int32 seat_index = 1;
  repeated string actions = 2;
}
