name: ci

"on":
  push: true
  pull_request: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Signed commit trial
        continue-on-error: true
        run: bash scripts/verify-signed-commit-trial.sh
      - run: make bootstrap
      - run: make verify
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make bootstrap
      - run: RUN_INTEGRATION=1 make verify-test-integration
      - run: RUN_INTEGRATION=1 make verify-test-integration-nodocker
      - run: RUN_INTEGRATION=1 make verify-test-integration-pg
