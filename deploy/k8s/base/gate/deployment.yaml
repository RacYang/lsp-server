apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsp-gate
  labels:
    app.kubernetes.io/name: lsp-gate
    app.kubernetes.io/part-of: lsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lsp-gate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lsp-gate
        app.kubernetes.io/part-of: lsp
    spec:
      containers:
        - name: gate
          image: lsp-gate:local
          imagePullPolicy: IfNotPresent
          env:
            - name: LSP_CONFIG
              value: /etc/lsp/gate.yaml
          ports:
            - name: websocket
              containerPort: 18080
            - name: obs
              containerPort: 18081
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/lsp
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: lsp-config
