apiVersion: v1
kind: Service
metadata:
  name: lsp-gate
  labels:
    app.kubernetes.io/name: lsp-gate
    app.kubernetes.io/part-of: lsp
spec:
  selector:
    app.kubernetes.io/name: lsp-gate
  ports:
    - name: websocket
      port: 18080
      targetPort: websocket
    - name: obs
      port: 18081
      targetPort: obs
