apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsp-lobby
  labels:
    app.kubernetes.io/name: lsp-lobby
    app.kubernetes.io/part-of: lsp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lsp-lobby
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lsp-lobby
        app.kubernetes.io/part-of: lsp
    spec:
      containers:
        - name: lobby
          image: lsp-lobby:local
          imagePullPolicy: IfNotPresent
          env:
            - name: LSP_CONFIG
              value: /etc/lsp/lobby.yaml
          ports:
            - name: grpc
              containerPort: 19081
            - name: obs
              containerPort: 19084
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/lsp
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: lsp-config
