apiVersion: apps/v1
kind: Deployment
metadata:
  name: lsp-room
  labels:
    app.kubernetes.io/name: lsp-room
    app.kubernetes.io/part-of: lsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lsp-room
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lsp-room
        app.kubernetes.io/part-of: lsp
    spec:
      containers:
        - name: room
          image: lsp-room:local
          imagePullPolicy: IfNotPresent
          env:
            - name: LSP_CONFIG
              value: /etc/lsp/room.yaml
          ports:
            - name: grpc
              containerPort: 19082
            - name: obs
              containerPort: 19083
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/lsp
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: lsp-config
